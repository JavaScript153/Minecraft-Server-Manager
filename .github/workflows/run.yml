name: Minecraft_24-7_NoBot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 最新のJava 26をセットアップ
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'oracle'

      - name: Pythonライブラリのインストール
        run: pip install discord.py customtkinter pystray pillow requests

      - name: playit.ggの準備
        run: |
          curl -SsL -o playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
          chmod +x playit

      - name: server.jarの安定版を自動ダウンロード
        run: |
          # Pythonを使って「安定版（リリース版）」だけを確実に選んでダウンロードします
          python3 -c '
          import requests
          manifest = requests.get("https://launchermeta.mojang.com/mc/game/version_manifest.json").json()
          
          # 最新の「安定版」のバージョン番号を取得
          release_id = manifest["latest"]["release"]
          print(f"Latest stable release is: {release_id}")
          
          # そのバージョンのダウンロードURLを探す
          for v in manifest["versions"]:
              if v["id"] == release_id:
                  url = v["url"]
                  break
                  
          version_data = requests.get(url).json()
          server_url = version_data["downloads"]["server"]["url"]
          print(f"Downloading from: {server_url}")
          
          # ダウンロード実行
          with open("server.jar", "wb") as f:
              f.write(requests.get(server_url).content)
          '
          # ファイルサイズの確認
          ls -lh server.jar

      - name: サーバー実行
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          echo "eula=true" > eula.txt
          ./playit --secret "$PLAYIT_SECRET" > /dev/null 2>&1 &
          sleep 10
          # リアルタイムログ出力を有効にして実行
          python3 -u server.py --headless

      - name: ワールドの自動保存
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "自動保存: $(date)" || echo "変更なし"
          git push
