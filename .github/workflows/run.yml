name: Minecraft_Final_Fix

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'oracle'

      - name: Playit Setup
        run: |
          curl -SsL -o playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
          chmod +x playit

      - name: Server Download (1.21.1 Stable)
        run: |
          # 以前の壊れたファイルを削除
          rm -f server.jar
          
          # 1.21.1 の公式URL
          URL="https://piston-data.mojang.com/v1/objects/450698d186214088031d4576307137b019da562c/server.jar"
          
          # ブラウザのふりをして、リトライを繰り返しながらダウンロード
          curl -A "Mozilla/5.0" -L --retry 5 --retry-delay 5 -o server.jar "$URL"
          
          # ファイルサイズの確認 (60MB以上あるかチェック)
          SIZE=$(stat -c%s "server.jar")
          if [ "$SIZE" -lt 10000000 ]; then
            echo "Error: server.jar download failed or file is too small ($SIZE bytes)."
            exit 1
          fi
          echo "Success: server.jar downloaded ($SIZE bytes)."

      - name: Start
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          echo "eula=true" > eula.txt
          # playitを裏で起動
          ./playit --secret "$PLAYIT_SECRET" > playit.log 2>&1 &
          
          # トンネルが安定するまで少し待つ
          sleep 10
          
          # サーバー開始 (-u でログをリアルタイム表示)
          python3 -u server.py

      - name: Auto Save
        if: always()
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add .
          git commit -m "World Save" || echo "No changes"
          git push
