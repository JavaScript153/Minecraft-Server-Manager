name: Minecraft_Actions_24-7

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  minecraft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'oracle'

      - name: Playit Download
        run: |
          curl -SsL -o playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
          chmod +x playit

      - name: Server Jar Download
        run: |
          python3 -c '
          import requests
          m = requests.get("https://launchermeta.mojang.com/mc/game/version_manifest.json").json()
          u = requests.get(next(v["url"] for v in m["versions"] if v["id"] == m["latest"]["release"])).json()["downloads"]["server"]["url"]
          open("server.jar", "wb").write(requests.get(u).content)
          '

      - name: Start EVERYTHING
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          # 1. まずplayitを完全に切り離して起動 (ここが重要！)
          # ログを playit.log に保存し、裏側で走らせます
          nohup ./playit --secret "$PLAYIT_SECRET" > playit.log 2>&1 &
          
          # 2. playitが準備できるまで少し待つ
          sleep 10
          
          # 3. マイクラサーバーを起動
          python3 -u server.py --headless

      - name: Auto Save
        if: always()
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add .
          git commit -m "ワールド自動保存" || echo "No changes"
          git push
