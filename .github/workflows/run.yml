name: Minecraft_Final_Fix

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Python Libs
        run: pip install requests
      - name: Playit Setup
        run: |
          curl -SsL -o playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
          chmod +x playit
      - name: Server Download (1.21.1 Stable)
        run: |
          # 1.21.1安定版をダウンロード
          python3 -c '
          import requests
          res = requests.get("https://piston-data.mojang.com/v1/objects/450698d186214088031d4576307137b019da562c/server.jar")
          with open("server.jar", "wb") as f: f.write(res.content)
          '
      - name: Start
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          ./playit --secret "$PLAYIT_SECRET" > playit.log 2>&1 &
          sleep 10
          python3 -u server.py
      - name: Save
        if: always()
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add .
          git commit -m "World Save" || echo ""
          git push
