name: Minecraft_Final_Fix

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'oracle'

      - name: Pythonライブラリの準備
        run: pip install requests

      - name: Playit Setup
        run: |
          curl -SsL -o playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
          chmod +x playit

      - name: server.jarの最強ダウンロード (アクセス拒否回避版)
        run: |
          python3 -c '
          import requests
          # 1. バージョン一覧を取得
          manifest = requests.get("https://launchermeta.mojang.com/mc/game/version_manifest.json").json()
          latest_release = manifest["latest"]["release"]
          print(f"Target Version: {latest_release}")
          
          # 2. 最新安定版のURLを特定
          version_url = next(v["url"] for v in manifest["versions"] if v["id"] == latest_release)
          server_url = requests.get(version_url).json()["downloads"]["server"]["url"]
          
          # 3. ブラウザのふりをしてダウンロード
          print(f"Downloading from official CDN...")
          headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"}
          response = requests.get(server_url, headers=headers, stream=True)
          
          if response.status_code == 200:
              with open("server.jar", "wb") as f:
                  for chunk in response.iter_content(chunk_size=8192):
                      f.write(chunk)
              print("Download Complete!")
          else:
              print(f"Failed! Status Code: {response.status_code}")
              exit(1)
          '
          # サイズを確認 (60MB前後なら成功)
          ls -lh server.jar

      - name: Start
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          echo "eula=true" > eula.txt
          ./playit --secret "$PLAYIT_SECRET" > playit.log 2>&1 &
          sleep 10
          python3 -u server.py

      - name: World Save
        if: always()
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add .
          git commit -m "World Save" || echo "No changes"
          git push
