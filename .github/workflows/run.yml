name: Minecraft_24-7_NoBot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Java 21 セットアップ
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Pythonライブラリのインストール
        run: pip install discord.py customtkinter pystray pillow

      - name: playit.ggのダウンロード
        run: |
          curl -SsL -o playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
          chmod +x playit

      - name: server.jarの確実なダウンロード
        run: |
          # 1.21.1 のリンク（もしリンクが切れていたら、最新の公式リンクをここに貼ってください）
          URL="https://piston-data.mojang.com/v1/objects/450698d186214088031d4576307137b019da562c/server.jar"
          
          # リトライ機能付きでダウンロード
          curl -L --retry 5 --retry-delay 5 -o server.jar "$URL"
          
          # ファイルサイズの確認 (0バイトならエラーにする)
          SIZE=$(stat -c%s "server.jar")
          if [ "$SIZE" -lt 1000000 ]; then
            echo "Error: server.jar is too small ($SIZE bytes). Download failed!"
            exit 1
          fi
          echo "Success: server.jar downloaded ($SIZE bytes)."

      - name: サーバー実行
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          echo "eula=true" > eula.txt
          ./playit --secret "$PLAYIT_SECRET" > /dev/null 2>&1 &
          sleep 10
          python3 -u server.py --headless

      - name: ワールドの自動保存
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "自動保存: $(date)" || echo "変更なし"
          git push
