name: Minecraft_24-7_NoBot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Java 21 セットアップ
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Pythonライブラリのインストール
        run: pip install discord.py customtkinter pystray pillow requests

      - name: playit.ggの準備
        run: |
          curl -SsL -o playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
          chmod +x playit

      - name: server.jarの最新版を自動ダウンロード
        run: |
          # Pythonを使ってマイクラ公式の最新版URLを自動取得してダウンロードします
          python3 -c '
          import requests
          import os
          # バージョン情報のマニフェストを取得
          manifest = requests.get("https://launchermeta.mojang.com/mc/game/version_manifest.json").json()
          latest_version_url = manifest["versions"][0]["url"]
          # 最新バージョンの詳細データを取得
          version_data = requests.get(latest_version_url).json()
          server_url = version_data["downloads"]["server"]["url"]
          print(f"Downloading from: {server_url}")
          # ダウンロード実行
          response = requests.get(server_url)
          with open("server.jar", "wb") as f:
              f.write(response.content)
          '
          # ファイルサイズの確認
          ls -lh server.jar

      - name: サーバー実行
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          echo "eula=true" > eula.txt
          ./playit --secret "$PLAYIT_SECRET" > /dev/null 2>&1 &
          sleep 10
          # リアルタイムログ出力を有効にして実行
          python3 -u server.py --headless

      - name: ワールドの自動保存
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "自動保存: $(date)" || echo "変更なし"
          git push
