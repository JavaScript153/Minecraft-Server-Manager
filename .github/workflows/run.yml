name: Minecraft_Final_Fix

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'oracle'

      - name: Playit Setup
        run: |
          curl -SsL -o playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
          chmod +x playit

      - name: Server Download (1.21.1 Stable)
        run: |
          # 1.21.1の安定版URLです
          curl -L -o server.jar https://piston-data.mojang.com/v1/objects/450698d186214088031d4576307137b019da562c/server.jar

      - name: Start
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          # 1. playitを裏で起動し、ログを playit.log に保存
          ./playit --secret "$PLAYIT_SECRET" > playit.log 2>&1 &
          
          # 2. 10秒待機してトンネルを完全に繋ぐ
          sleep 10
          
          # 3. サーバー開始
          python3 -u server.py

      - name: Auto Save
        if: always()
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add .
          git commit -m "World Save" || echo "No changes"
          git push
